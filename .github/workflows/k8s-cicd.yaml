# set condition for when to run the action files 
on: 
  push: 
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# build docker image , push dockerhub
env: 
  DOCKER_IMAGE_NAME: k8s-reactjs-itp-gen1
  HELM_REPO: PorKeat/gitops-itp1-repo

jobs: 
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

  ci-job: 
    needs: setup
    runs-on: ubuntu-latest 
    timeout-minutes: 15
    environment: DOCKER_ENV
    env:
      TAG: ${{ needs.setup.outputs.tag }}
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Show the SHA values 
        run: |
          echo "TAG = ${{ env.TAG }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Dockerhub 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and Push to Dockerhub 
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# update helm repo with new image
  cd-job: 
    needs: [setup, ci-job]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: DOCKER_ENV
    env:
      TAG: ${{ needs.setup.outputs.tag }}
    steps: 
      - name: Install yq command 
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Clone ArgoCD repo 
        run: | 
          git clone https://github.com/${{ env.HELM_REPO }} helm_repo 

      - name: Update Helm Chart 
        run: |
          cd helm_repo/reactjs-helm

          echo "Update repository username/imagename"
          yq -i ".image.repository=\"${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}\"" values.yaml

          echo "Update image tag"
          yq -i ".image.tag=\"${{ env.TAG }}\"" values.yaml

          git config --global user.email "username@example.com"
          git config --global user.name "dummyname"
          git add . 
          git commit -m "Update helm to use image : ${{ env.TAG }}"
          
          git push https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }}
      
      - name: Clean up 
        if: always()
        run: | 
          rm -rf helm_repo
          